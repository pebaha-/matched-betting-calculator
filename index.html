<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matched Betting Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Matched Betting Calculator</h1>

        <label>
          Bet type
          <select id="betType">
            <option value="normal">Normal</option>
            <option value="free">Free Bet (SNR)</option>
            <option value="riskfree">Risk Free</option>
          </select>
        </label>

        <label>
          Back stake
          <input id="backStake" type="number" step="0.01" value="100">
        </label>

        <label>
          Back odds
          <input id="backOdds" type="number" step="0.01" value="2.0">
        </label>

        <label>
          Lay odds
          <input id="layOdds" type="number" step="0.01" value="2.1">
        </label>

        <label>
          Commission in % (fx 6.5% for Betfair)
          <input id="commission" type="number" step="0.01" value="6.5">
        </label>

        <label id="rtpContainer" style="display: none;">
          Free bet RTP (%)
          <input type="number" id="freebetRtp" value="70" step="1">
        </label>

        <div class="result">
          <div class="row highlight">
            <span class="label">Lay stake</span>
            <span class="value" id="layStake">-</span>
          </div>

          <div class="row">
            <span class="label">Profit (back wins)</span>
            <span class="value" id="profitBack">-</span>
          </div>

          <div class="row">
            <span class="label">Profit (lay wins)</span>
            <span class="value" id="profitLay">-</span>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
