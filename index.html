<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Matched Betting Calculator</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
  <div class="container">
    <div class="panel">

      <!-- LEFT COLUMN -->
      <div class="card">
        <h1>Matched Betting Calculator</h1>

        <label>
          Bet type

          <select id="betType">
            <option value="normal">
              Normal
            </option>

            <option value="free">
              Free Bet (SNR)
            </option>

            <option value="riskfree">
              Risk Free
            </option>
          </select>
        </label>

        <label>
          Back stake

          <input type="number" id="backStake" value="100" step="0.01">
        </label>

        <label>
          Back odds

          <input type="number" id="backOdds" value="2.0" step="0.01">
        </label>

        <label>
          Lay odds

          <input type="number" id="layOdds" value="2.0" step="0.01">
        </label>

        <label>
          Commission (%)

          <input type="number" id="commission" value="6.5" step="0.1">
        </label>

        <label id="rtpContainer" style="display: none;">
          Free bet RTP (%)

          <input type="number" id="freebetRtp" value="70" step="1">
        </label>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="card">
        <div class="result">
          <div class="row highlight">
            <span class="label">
              Lay stake
            </span>

            <span class="value" id="layStake">
              -
            </span>
          </div>
        </div>

        <div class="breakdown">
          <h2>Breakdown</h2>

          <div class="scenario">
            <h3>
              If Bookmaker (Back) bet wins
            </h3>

            <div class="row">
              <span class="label">
                Bookmaker
              </span>

              <span class="value" id="bookmakerBackWin">
                -
              </span>
            </div>

            <div class="row">
              <span class="label">
                Exchange
              </span>

              <span class="value" id="exchangeBackWin">
                -
              </span>
            </div>

            <div class="row total">
              <span class="label">
                Total
              </span>

              <span class="value" id="totalBackWin">
                -
              </span>
            </div>
          </div>

          <div class="scenario">
            <h3>
              If Exchange (Lay) bet wins
            </h3>

            <div class="row">
              <span class="label">
                Bookmaker
              </span>

              <span class="value" id="bookmakerLayWin">
                -
              </span>
            </div>

            <div class="row">
              <span class="label">
                Exchange
              </span>

              <span class="value" id="exchangeLayWin">
                -
              </span>
            </div>

            <div class="row" id="freebetLayRow" style="display: none;">
              <span class="label">
                Free Bet
              </span>

              <span class="value" id="freebetLayWin">
                -
              </span>
            </div>

            <div class="row total">
              <span class="label">
                Total
              </span>

              <span class="value" id="totalLayWin">
                -
              </span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
